document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c: url(\"73919190-4fbc-4606-9aee-b6e619219c66\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5cf1ecd4-5bf5-491b-9876-d47e4a76a439\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; }\n  ::selection { background: #C79A3E; color: #0A1828; }\n  @keyframes ga-rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }\n  @media (min-width: 880px) { .ga-navlink { display: inline-block !important; } }\n  .ga-navlink:hover { color: #F6F3EC !important; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: 'Manrope', system-ui, sans-serif; color: #16202C; background: #F6F3EC; -webkit-font-smoothing: antialiased; overflow-x: hidden;\">\n\n  <!-- ============ HEADER ============ -->\n  <header style=\"position: sticky; top: 0; z-index: 50; background: rgba(10,24,40,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08);\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: 0 32px; height: 76px; display: flex; align-items: center; justify-content: space-between;\">\n      <a href=\"#top\" style=\"display: flex; align-items: center; gap: 11px; text-decoration: none;\">\n        <span style=\"width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border: 1.5px solid #C79A3E; border-radius: 3px; transform: rotate(45deg);\">\n          <span style=\"width: 9px; height: 9px; background: #C79A3E; display: block;\"><\u002Fspan>\n        <\u002Fspan>\n        <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 21px; letter-spacing: -0.01em; color: #F6F3EC;\">Geo<span style=\"color: #C79A3E;\">Altus<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <nav style=\"display: flex; align-items: center; gap: 34px;\">\n        <a href=\"#servicio\" style=\"display: none; text-decoration: none; color: #C9D3DE; font-size: 14.5px; font-weight: 500;\" class=\"ga-navlink\">El servicio<\u002Fa>\n        <a href=\"#como\" style=\"display: none; text-decoration: none; color: #C9D3DE; font-size: 14.5px; font-weight: 500;\" class=\"ga-navlink\">Cómo lo hacemos<\u002Fa>\n        <a href=\"#resultados\" style=\"display: none; text-decoration: none; color: #C9D3DE; font-size: 14.5px; font-weight: 500;\" class=\"ga-navlink\">Resultados<\u002Fa>\n        <a href=\"#confianza\" style=\"display: none; text-decoration: none; color: #C9D3DE; font-size: 14.5px; font-weight: 500;\" class=\"ga-navlink\">Confianza<\u002Fa>\n        <a href=\"#contacto\" style=\"text-decoration: none; background: #C79A3E; color: #0A1828; font-weight: 700; font-size: 14.5px; padding: 11px 20px; border-radius: 4px;\" style-hover=\"background: #D9AE54;\">Conversemos<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ HERO ============ -->\n  <section id=\"top\" style=\"position: relative; background: #0A1828; color: #F6F3EC; overflow: hidden;\">\n    <!-- contour decoration -->\n    <svg viewBox=\"0 0 600 600\" preserveAspectRatio=\"xMidYMid slice\" style=\"position: absolute; top: -10%; right: -8%; width: 720px; height: 720px; opacity: 0.5; pointer-events: none;\">\n      <g fill=\"none\" stroke=\"#C79A3E\" stroke-width=\"1\" stroke-opacity=\"0.20\">\n        <ellipse cx=\"300\" cy=\"300\" rx=\"80\" ry=\"58\"><\u002Fellipse>\n        <ellipse cx=\"300\" cy=\"300\" rx=\"130\" ry=\"96\"><\u002Fellipse>\n        <ellipse cx=\"300\" cy=\"300\" rx=\"184\" ry=\"138\"><\u002Fellipse>\n        <ellipse cx=\"300\" cy=\"300\" rx=\"242\" ry=\"184\"><\u002Fellipse>\n        <ellipse cx=\"300\" cy=\"300\" rx=\"304\" ry=\"234\"><\u002Fellipse>\n        <ellipse cx=\"300\" cy=\"300\" rx=\"370\" ry=\"288\"><\u002Fellipse>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div style=\"position: absolute; inset: 0; background: radial-gradient(120% 90% at 18% 12%, rgba(199,154,62,0.10), transparent 55%);\"><\u002Fdiv>\n\n    <div style=\"position: relative; max-width: 1240px; margin: 0 auto; padding: 104px 32px 116px; display: flex; flex-direction: column; gap: 0;\">\n      <div style=\"display: inline-flex; align-items: center; gap: 10px; align-self: flex-start; border: 1px solid rgba(199,154,62,0.45); border-radius: 100px; padding: 7px 15px; margin-bottom: 30px; animation: ga-rise 0.6s both;\">\n        <span style=\"width: 7px; height: 7px; border-radius: 50%; background: #C79A3E;\"><\u002Fspan>\n        <span style=\"font-size: 12.5px; letter-spacing: 0.10em; text-transform: uppercase; color: #C9D3DE; font-weight: 600;\">Monitoreo geoespacial<\u002Fspan>\n      <\u002Fdiv>\n\n      <h1 style=\"font-family: 'Archivo', sans-serif; font-weight: 900; font-size: clamp(40px, 6.6vw, 78px); line-height: 1.0; letter-spacing: -0.025em; margin: 0; max-width: 16ch; text-wrap: balance; animation: ga-rise 0.7s 0.05s both;\">\n        Mide tu operación.<br><span style=\"color: #C79A3E;\">Controla tu proceso.<\u002Fspan>\n      <\u002Fh1>\n\n      <p style=\"font-size: clamp(17px, 2.1vw, 22px); line-height: 1.5; color: #C2CDD9; margin: 30px 0 0; max-width: 46ch; font-weight: 400; animation: ga-rise 0.7s 0.12s both;\">\n        Del dato a la decisión: monitoreo geoespacial que convierte mediciones en respuestas claras.\n      <\u002Fp>\n\n      <div style=\"display: flex; flex-wrap: wrap; align-items: center; gap: 18px; margin-top: 42px; animation: ga-rise 0.7s 0.2s both;\">\n        <a href=\"#contacto\" style=\"text-decoration: none; background: #C79A3E; color: #0A1828; font-weight: 700; font-size: 16px; padding: 16px 30px; border-radius: 5px; box-shadow: 0 12px 34px rgba(199,154,62,0.28);\" style-hover=\"background: #D9AE54;\">Conversemos sobre tu proyecto →<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; flex-wrap: wrap; gap: 36px; margin-top: 64px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.10);\">\n        <div style=\"display: flex; flex-direction: column; gap: 4px;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 15px; color: #C79A3E; letter-spacing: 0.02em;\">Conoce el estado real<\u002Fspan>\n          <span style=\"font-size: 13.5px; color: #8A98A6;\">Alta precisioón georreferenciada<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 4px;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 15px; color: #C79A3E; letter-spacing: 0.02em;\">Decisiones con respaldo<\u002Fspan>\n          <span style=\"font-size: 13.5px; color: #8A98A6;\">Certificación RPAS DGAC<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 4px;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 15px; color: #C79A3E; letter-spacing: 0.02em;\">Datos sin sesgo<\u002Fspan>\n          <span style=\"font-size: 13.5px; color: #8A98A6;\">Medicion externa e imparcial<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ EL PROBLEMA ============ -->\n  <section style=\"background: #F6F3EC; padding: 100px 32px;\">\n    <div style=\"max-width: 1000px; margin: 0 auto;\">\n      <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #B07F1E;\">El problema<\u002Fspan>\n      <p style=\"font-family: 'Archivo', sans-serif; font-weight: 600; font-size: clamp(26px, 3.8vw, 40px); line-height: 1.28; letter-spacing: -0.015em; color: #16202C; margin: 22px 0 0; text-wrap: pretty;\">Tu operación avanza sin una medición objetiva y periódica de su volumen y su avance real. <span style=\"color: rgb(106, 119, 135);\">Decides a ciegas, o con datos esporádicos que llegan tarde — y cada decisión sin medición se paga en sobrecostos, atrasos y disputas que pudieron evitarse.<\u002Fspan>\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ EL SERVICIO (corazón) ============ -->\n  <section id=\"servicio\" style=\"background: #0A1828; color: #F6F3EC; padding: 104px 32px;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"max-width: 760px;\">\n        <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #C79A3E;\">El servicio de monitoreo<\u002Fspan>\n        <h2 style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(30px, 4.4vw, 50px); line-height: 1.08; letter-spacing: -0.02em; margin: 18px 0 0;\">Un servicio continuo, no un entregable suelto.<\u002Fh2>\n        <p style=\"font-size: 18px; line-height: 1.6; color: #C2CDD9; margin: 22px 0 0;\">Acompañamos tu operación a lo largo del tiempo: medimos, comparamos y reportamos de forma recurrente, para que el control no dependa de una foto aislada sino de una serie que muestra hacia dónde va el proceso.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(248px, 1fr)); gap: 1px; margin-top: 56px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; overflow: hidden;\">\n        <div style=\"background: #0E2034; padding: 34px 28px;\">\n          <div style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 22px; color: #C79A3E;\">01<\u002Fdiv>\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 18.5px; margin: 16px 0 8px;\">Control volumétrico<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.55; color: #9DAAB8; margin: 0;\">El volúmen exacto de material, cuantificado con precisión período tras período.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #0E2034; padding: 34px 28px;\">\n          <div style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 22px; color: #C79A3E;\">02<\u002Fdiv>\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 18.5px; margin: 16px 0 8px;\">Avance vs lo planificado<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.55; color: #9DAAB8; margin: 0;\">Seguimiento del progreso real contra lo planificado, visible en cada ciclo de medición.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #0E2034; padding: 34px 28px;\">\n          <div style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 22px; color: #C79A3E;\">03<\u002Fdiv>\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 18.5px; margin: 16px 0 8px;\">Reportes periódicos<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.55; color: #9DAAB8; margin: 0;\">Entregas regulares con la situación actualizada, comparable en el tiempo y lista para tomar decisiones.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #0E2034; padding: 34px 28px;\">\n          <div style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 22px; color: #C79A3E;\">04<\u002Fdiv>\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 18.5px; margin: 16px 0 8px;\">Análisis de la situación<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.55; color: #9DAAB8; margin: 0;\">No solo el dato: la lectura de qué significa, qué cambió y qué exige atención ahora.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- IMPARCIALIDAD differentiator -->\n      <div style=\"margin-top: 28px; background: linear-gradient(120deg, #14293F, #0E2034); border: 1px solid rgba(199,154,62,0.30); border-radius: 8px; padding: 44px 40px; display: flex; flex-wrap: wrap; gap: 32px; align-items: center;\">\n        <div style=\"flex: 0 0 auto; width: 64px; height: 64px; border-radius: 8px; background: rgba(199,154,62,0.12); border: 1px solid rgba(199,154,62,0.4); display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C79A3E\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v18\"><\u002Fpath><path d=\"M3 7h18\"><\u002Fpath><path d=\"M6 7l-3 7a3 3 0 0 0 6 0z\"><\u002Fpath><path d=\"M18 7l-3 7a3 3 0 0 0 6 0z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"flex: 1 1 320px;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 12.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #C79A3E;\">El diferenciador<\u002Fspan>\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(22px, 2.8vw, 30px); line-height: 1.18; margin: 12px 0 10px; letter-spacing: -0.015em;\">Mediciones imparciales que respaldan <span style=\"color: #C79A3E;\">tus<\u002Fspan> decisiones.<\u002Fh3>\n          <p style=\"font-size: 16px; line-height: 1.6; color: #C2CDD9; margin: 0; max-width: 60ch;\">Medimos sin conflicto de interés: no ejecutamos la obra que evaluamos, así que el número que entregamos es objetivo. Es la diferencia entre una cifra que nadie discute y una que tienes que justificar.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CÓMO LO HACEMOS ============ -->\n  <section id=\"como\" style=\"background: #F6F3EC; padding: 104px 32px;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"max-width: 720px;\">\n        <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #B07F1E;\">Cómo lo hacemos<\u002Fspan>\n        <h2 style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(28px, 4.2vw, 46px); line-height: 1.1; letter-spacing: -0.02em; margin: 18px 0 0; color: #16202C;\">La tecnología es el medio. El control es el producto.<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.6; color: #5A6675; margin: 20px 0 0;\">Combinamos un stack geoespacial probado para capturar la realidad del terreno con exactitud y traducirla en información que puedes decidir.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; margin-top: 50px;\">\n        <div style=\"background: #fff; border: 1px solid #E6E0D2; border-radius: 8px; padding: 30px 26px;\">\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 18px; margin: 0 0 8px; color: #16202C;\">Fotogrametría con RPAS<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.55; color: #5A6675; margin: 0;\">Captura aérea de alta resolución para reconstruir el terreno en 3D y medir volúmenes con fidelidad.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #E6E0D2; border-radius: 8px; padding: 30px 26px;\">\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 18px; margin: 0 0 8px; color: #16202C;\">Teledetección<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.55; color: #5A6675; margin: 0;\">Análisis remoto del territorio para detectar cambios y patrones a escala de la operación completa.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #E6E0D2; border-radius: 8px; padding: 30px 26px;\">\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 18px; margin: 0 0 8px; color: #16202C;\">Sistemas de Información Geográfica<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.55; color: #5A6675; margin: 0;\">Integración y análisis espacial de los datos en SIG, para convertir mediciones en mapas y respuestas.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #E6E0D2; border-radius: 8px; padding: 30px 26px;\">\n          <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 18px; margin: 0 0 8px; color: #16202C;\">Medición GNSS<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.55; color: #5A6675; margin: 0;\">Georreferenciación de precisión que ancla cada medición a coordenadas reales, con exactitud centimétrica.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- credenciales band -->\n      <div style=\"margin-top: 40px; background: #0A1828; border-radius: 8px; padding: 36px 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 28px;\">\n        <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 18px; color: #C79A3E;\">RPAS DGAC<\u002Fspan>\n          <span style=\"font-size: 13.5px; color: #9DAAB8; line-height: 1.45;\">Operación aérea certificada ante la autoridad aeronáutica.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 18px; color: #C79A3E;\">Precisión centimétrica<\u002Fspan>\n          <span style=\"font-size: 13.5px; color: #9DAAB8; line-height: 1.45;\">Datos confiables en cada entrega.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 18px; color: #C79A3E;\">Stack pro<\u002Fspan>\n          <span style=\"font-size: 13.5px; color: #9DAAB8; line-height: 1.45;\">ArcGIS Pro · Global Mapper · ERDAS Imagine.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 18px; color: #C79A3E;\">Minería<\u002Fspan>\n          <span style=\"font-size: 13.5px; color: #9DAAB8; line-height: 1.45;\">Experiencia real del equipo en geomática para minería.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"text-align: center; font-size: 15.5px; color: #6A7787; margin: 28px 0 0; font-weight: 500;\">Aplicable a minería, construcción, áridos y cualquier operación medible.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CÓMO EMPEZAR ============ -->\n  <section style=\"background: #102338; color: #F6F3EC; padding: 96px 32px; position: relative; overflow: hidden;\">\n    <div style=\"position: absolute; inset: 0; background: radial-gradient(90% 120% at 90% 0%, rgba(199,154,62,0.10), transparent 50%);\"><\u002Fdiv>\n    <div style=\"position: relative; max-width: 1000px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 48px; align-items: center;\">\n      <div style=\"flex: 1 1 380px;\">\n        <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #C79A3E;\">Cómo empezar<\u002Fspan>\n        <h2 style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(28px, 4vw, 44px); line-height: 1.1; letter-spacing: -0.02em; margin: 18px 0 16px;\">Empieza con una auditoría operacional única.<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.62; color: #C2CDD9; margin: 0 0 14px;\">Un primer paso de bajo compromiso: una auditoría operacional puntual, con resultados claros y accionables desde la primera entrega.<\u002Fp>\n        <p style=\"font-size: 17px; line-height: 1.62; color: #C2CDD9; margin: 0;\">Es la primera dosis del mismo servicio — y la base natural para transformarla en monitoreo continuo cuando veas el valor de tener la operación bajo control.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex: 0 1 300px;\">\n        <div style=\"background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 30px;\">\n          <div style=\"display: flex; align-items: center; gap: 14px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.10);\">\n            <span style=\"width: 32px; height: 32px; border-radius: 6px; background: #C79A3E; color: #0A1828; font-family: 'Archivo', sans-serif; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 15px;\">1<\u002Fspan>\n            <span style=\"font-weight: 600; font-size: 15.5px;\">Auditoría operacional<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 14px; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.10);\">\n            <span style=\"width: 32px; height: 32px; border-radius: 6px; background: rgba(199,154,62,0.18); color: #C79A3E; font-family: 'Archivo', sans-serif; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 15px;\">2<\u002Fspan>\n            <span style=\"font-weight: 500; font-size: 15.5px; color: #C2CDD9;\">Reportes periódicos<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 14px; padding-top: 18px;\">\n            <span style=\"width: 32px; height: 32px; border-radius: 6px; background: rgba(199,154,62,0.18); color: #C79A3E; font-family: 'Archivo', sans-serif; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 15px;\">3<\u002Fspan>\n            <span style=\"font-weight: 500; font-size: 15.5px; color: #C2CDD9;\">Monitoreo continuo<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ DEMOSTRACIÓN VISUAL ============ -->\n  <section id=\"resultados\" style=\"background: #F6F3EC; padding: 104px 32px;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"max-width: 720px; margin-bottom: 48px;\">\n        <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #B07F1E;\">Resultados<\u002Fspan>\n        <h2 style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(28px, 4.2vw, 46px); line-height: 1.1; letter-spacing: -0.02em; margin: 18px 0 0; color: #16202C;\">Así se ve el control.<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.6; color: #5A6675; margin: 18px 0 0;\">Comparativas temporales, cálculo de volumen y paneles geoespaciales. Una muestra del material que entregamos en cada período.<\u002Fp>\n      <\u002Fdiv>\n\n      \n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n        <sc-for list=\"{{ gallery }}\" as=\"g\" hint-placeholder-count=\"6\">\n          <figure style=\"margin: 0; background: #fff; border: 1px solid #E6E0D2; border-radius: 8px; overflow: hidden;\">\n            <div style=\"aspect-ratio: 4 / 3; background-color: #DEE5EA; background-image: repeating-linear-gradient(135deg, rgba(10,24,40,0.06) 0 12px, rgba(10,24,40,0.10) 12px 24px); display: flex; align-items: center; justify-content: center; position: relative;\">\n              <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #5A6675; background: rgba(246,243,236,0.9); padding: 7px 12px; border-radius: 4px;\">{{ g.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <figcaption style=\"padding: 16px 18px;\">\n              <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 16px; margin: 0 0 4px; color: #16202C;\">{{ g.title }}<\u002Fh3>\n              <p style=\"font-size: 13.5px; line-height: 1.45; color: #6A7787; margin: 0;\">{{ g.desc }}<\u002Fp>\n            <\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fsc-for>\n      <\u002Fdiv><p style=\"font-size: 13px; color: #98A0A8; margin: 24px 0 0; text-align: center; font-style: italic;\">Material ilustrativo — se reemplazará con resultados reales anonimizados.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ EXPERIENCIA Y CONFIANZA ============ -->\n  <section id=\"confianza\" style=\"background: #0A1828; color: #F6F3EC; padding: 104px 32px;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 56px; align-items: start;\">\n      <div>\n        <span style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #C79A3E;\">Experiencia y confianza<\u002Fspan>\n        <h2 style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(28px, 4vw, 44px); line-height: 1.12; letter-spacing: -0.02em; margin: 18px 0 22px;\">Empresa nueva. Experiencia real.<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.62; color: #C2CDD9; margin: 0 0 16px;\">GeoAltus nace de la trayectoria de su fundador en geomática aplicada a minería: años midiendo, modelando y entregando información geoespacial en operaciones exigentes del rubro.<\u002Fp>\n        <p style=\"font-size: 17px; line-height: 1.62; color: #C2CDD9; margin: 0;\">La credibilidad no se construye sobre promesas, sino sobre capacidades técnicas concretas y respaldo formal verificable.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <div style=\"background: #0E2034; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 24px 26px; display: flex; gap: 16px; align-items: flex-start;\">\n          <span style=\"color: #C79A3E; font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 14px; margin-top: 2px;\">✓<\u002Fspan>\n          <div>\n            <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 16.5px; margin: 0 0 4px;\">Trayectoria en minería<\u002Fh3>\n            <p style=\"font-size: 14.5px; line-height: 1.5; color: #9DAAB8; margin: 0;\">Experiencia del fundador en geomática para faenas mineras. Clientes anonimizados por confidencialidad.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #0E2034; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 24px 26px; display: flex; gap: 16px; align-items: flex-start;\">\n          <span style=\"color: #C79A3E; font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 14px; margin-top: 2px;\">✓<\u002Fspan>\n          <div>\n            <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 16.5px; margin: 0 0 4px;\">Certificación RPAS DGAC<\u002Fh3>\n            <p style=\"font-size: 14.5px; line-height: 1.5; color: #9DAAB8; margin: 0;\">Operación de aeronaves pilotadas a distancia conforme a la normativa aeronáutica vigente.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #0E2034; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 24px 26px; display: flex; gap: 16px; align-items: flex-start;\">\n          <span style=\"color: #C79A3E; font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 14px; margin-top: 2px;\">✓<\u002Fspan>\n          <div>\n            <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 16.5px; margin: 0 0 4px;\">Empresa formalmente constituida<\u002Fh3>\n            <p style=\"font-size: 14.5px; line-height: 1.5; color: #9DAAB8; margin: 0;\">GeoAltus · RUT 78.203.528-2 · Coquimbo, Chile. Respaldo legal y tributario verificable.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTACTO ============ -->\n  <section id=\"contacto\" style=\"background: #F6F3EC; padding: 104px 32px;\">\n    <div style=\"max-width: 1080px; margin: 0 auto; background: #fff; border: 1px solid #E6E0D2; border-radius: 14px; overflow: hidden; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));\">\n      <div style=\"background: #0A1828; color: #F6F3EC; padding: 52px 44px; display: flex; flex-direction: column; justify-content: center;\">\n        <h2 style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(28px, 3.6vw, 38px); line-height: 1.12; letter-spacing: -0.02em; margin: 0 0 16px;\">Conversemos sobre tu operación.<\u002Fh2>\n        <p style=\"font-size: 16px; line-height: 1.6; color: #C2CDD9; margin: 0 0 30px;\">Cuéntanos qué necesitas controlar. Te respondemos con una propuesta concreta para tu primera medición.<\u002Fp>\n        <a href=\"mailto:contacto@geoaltus.cl\" style=\"display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: #C79A3E; font-weight: 700; font-size: 16px;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C79A3E\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"m3 7 9 6 9-6\"><\u002Fpath><\u002Fsvg>\n          contacto@geoaltus.cl\n        <\u002Fa>\n        <div style=\"margin-top: 26px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.10); font-size: 13.5px; color: #8A98A6; line-height: 1.6;\">\n          GeoAltus · Coquimbo, Chile<br>RUT 78.203.528-2 · geoaltus.cl\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 52px 44px;\">\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"height: 100%; min-height: 280px; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 14px;\">\n            <span style=\"width: 52px; height: 52px; border-radius: 50%; background: rgba(199,154,62,0.14); border: 1px solid #C79A3E; display: flex; align-items: center; justify-content: center; color: #B07F1E; font-size: 24px;\">✓<\u002Fspan>\n            <h3 style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 24px; margin: 0; color: #16202C;\">Mensaje recibido.<\u002Fh3>\n            <p style=\"font-size: 15.5px; color: #5A6675; margin: 0; line-height: 1.55;\">Gracias. Revisaremos tu operación y te contactaremos a la brevedad.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onSubmit }}\" style=\"display: flex; flex-direction: column; gap: 18px;\">\n            <div style=\"display: flex; flex-direction: column; gap: 7px;\">\n              <label style=\"font-size: 13px; font-weight: 600; color: #16202C; letter-spacing: 0.01em;\">Nombre<\u002Flabel>\n              <input required=\"\" type=\"text\" placeholder=\"Tu nombre\" style=\"font-family: inherit; font-size: 15px; padding: 13px 15px; border: 1px solid #D8D1C2; border-radius: 6px; background: #FAF8F3; color: #16202C; outline: none;\" style-focus=\"border-color: #C79A3E; background: #fff;\">\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 7px;\">\n              <label style=\"font-size: 13px; font-weight: 600; color: #16202C; letter-spacing: 0.01em;\">Correo<\u002Flabel>\n              <input required=\"\" type=\"email\" placeholder=\"tu@empresa.cl\" style=\"font-family: inherit; font-size: 15px; padding: 13px 15px; border: 1px solid #D8D1C2; border-radius: 6px; background: #FAF8F3; color: #16202C; outline: none;\" style-focus=\"border-color: #C79A3E; background: #fff;\">\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 7px;\">\n              <label style=\"font-size: 13px; font-weight: 600; color: #16202C; letter-spacing: 0.01em;\">¿Qué necesitas controlar?<\u002Flabel>\n              <textarea rows=\"3\" placeholder=\"Cuéntanos brevemente sobre tu operación\" style=\"font-family: inherit; font-size: 15px; padding: 13px 15px; border: 1px solid #D8D1C2; border-radius: 6px; background: #FAF8F3; color: #16202C; outline: none; resize: vertical;\" style-focus=\"border-color: #C79A3E; background: #fff;\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 15.5px; background: #C79A3E; color: #0A1828; border: none; padding: 15px; border-radius: 6px; cursor: pointer; margin-top: 4px;\" style-hover=\"background: #D9AE54;\">Enviar mensaje<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background: #0A1828; color: #8A98A6; padding: 40px 32px;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: space-between;\">\n      <div style=\"display: flex; align-items: center; gap: 10px;\">\n        <span style=\"width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; border: 1.5px solid #C79A3E; border-radius: 3px; transform: rotate(45deg);\"><span style=\"width: 7px; height: 7px; background: #C79A3E; display: block;\"><\u002Fspan><\u002Fspan>\n        <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 16px; color: #F6F3EC;\">Geo<span style=\"color: #C79A3E;\">Altus<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size: 13px;\">© 2026 GeoAltus · RUT 78.203.528-2 · Coquimbo, Chile<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { sent: false };\n  renderVals() {\n    return {\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      onSubmit: (e) => { e.preventDefault(); this.setState({ sent: true }); },\n      gallery: [\n        { tag: \"Antes / Después\", title: \"Comparativa temporal\", desc: \"Cambio del terreno entre dos mediciones consecutivas.\" },\n        { tag: \"Volumen\", title: \"Cálculo de volumen\", desc: \"Cubicación de cortes y rellenos sobre el modelo.\" },\n        { tag: \"SIG / Dashboard\", title: \"Panel de control geoespacial\", desc: \"Datos de la operación integrados y visualizados para decidir.\" }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
